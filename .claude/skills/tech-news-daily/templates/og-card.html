<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daily Tech Brief OG Card</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --kaist-blue: #1f4899;
    --kaist-blue-deep: #15326b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: var(--kaist-blue);
    color: #fff;
    font-family: 'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  body::before {
    content: "";
    position: absolute;
    right: -150px;
    bottom: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* 상단 — 브랜드 (크게) */
  .brand {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-bottom: 42px;
  }
  .brand-logo {
    height: 78px;
    width: auto;
    flex-shrink: 0;
    background: #fff;
    padding: 10px 16px;
    border-radius: 10px;
  }
  .brand-name {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
  }

  /* 중앙 — 제호 + 날짜 */
  .title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 28px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .masthead {
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.035em;
  }
  .date-line {
    font-family: 'Inter', 'Pretendard', sans-serif;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.95);
    line-height: 1;
  }
  .date-line .dow {
    margin-left: 10px;
    color: rgba(255,255,255,0.65);
    font-weight: 700;
  }

  /* 오늘의 키워드 — 평등한 톤, 한 영역 */
  .keywords-block {
    flex: 1;
    background: var(--kaist-blue-deep);
    border-radius: 14px;
    padding: 20px 26px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .keywords-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 22px;
  }
  .keywords .kw {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.1;
    color: #fff;
  }

  /* 하단 — URL */
  .footer {
    margin-top: 22px;
    display: flex;
    justify-content: flex-end;
  }
  .footer-url {
    font-family: 'Inter', monospace;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    letter-spacing: -0.005em;
  }
</style>
</head>
<body>
  <div class="brand">
    <img class="brand-logo" id="brandLogo" alt="KCB" />
    <div class="brand-name">KAIST 경영대학 테크 네트워크</div>
  </div>

  <div class="title-row">
    <div class="masthead">데일리 테크 브리프</div>
    <div class="date-line" id="dateLine">— <span class="dow"></span></div>
  </div>

  <div class="keywords-block">
    <div class="keywords-label">오늘의 키워드</div>
    <div class="keywords" id="keywordList"></div>
  </div>

  <div class="footer">
    <div class="footer-url" id="footerUrl">kaistbiztech.github.io/dailytechbrief</div>
  </div>

<script>
  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function render(ed, logoDataUrl) {
    if (logoDataUrl) document.getElementById('brandLogo').src = logoDataUrl;

    const dateStr = ed.id.replaceAll('-', '.');
    document.getElementById('dateLine').innerHTML =
      `${dateStr} <span class="dow">${ed.dayOfWeek}요일</span>`;

    // 각 카드(1~10번)의 첫 번째 키워드 1개씩 = 정확히 10개를 평등하게 노출
    const cloud = document.getElementById('keywordList');
    cloud.innerHTML = '';
    ed.newsItems.forEach(it => {
      const kw = (it.keywords || [])[0];
      if (!kw) return;
      const span = document.createElement('span');
      span.className = 'kw';
      span.textContent = kw;
      cloud.appendChild(span);
    });
  }
  window.renderEdition = render;
</script>
</body>
</html>
